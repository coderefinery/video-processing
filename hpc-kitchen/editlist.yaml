# slurm
- output: out/
  input: raw/
  title: "HPC kitchen [slurm]: the Slurm job scheduler spreads tasks to the cluster"
  description: >-
    We have talked about running stuff in parallel, but how does it get connected to hardware (processors, memory)?  If we have one cluster for everyone, how do people share?  That's what this is all about.

    Extra commentary / corrections:

    * Slurm is the system that allocates resources, but you don't need to know details: for basic use, follow your local instructions.

    * For the most part, you will see the instructions for your own cluster, which will say what options are needed.

    * This is the point where you really need command line and shell scripting, because you have to automate all of the steps you use.

